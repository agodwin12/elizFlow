# ElizFlow backend — connects to the EXISTING PostgreSQL on the VPS host
# (via host.docker.internal). No database container is created here.
services:
  backend:
    build: .
    image: elizflow-backend:latest
    container_name: elizflow_backend
    init: true
    ports:
      - "11000:11000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Provide the Firebase service account without baking it into the image.
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:11000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
